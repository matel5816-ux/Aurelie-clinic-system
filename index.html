<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奧蕾莉醫美診所 - 預約管理系統</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #d4757c;
            --primary-dark: #8b3a42;
            --secondary: #2d2d2d;
            --accent: #f5f5f5;
            --success: #4a9d6f;
            --danger: #c9534c;
            --warning: #ec971f;
            --light: #fafafa;
            --light-gray: #e8e8e8;
            --gray: #666;
            --dark: #1a1a1a;
            --white: #ffffff;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: var(--light);
            color: var(--secondary);
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: var(--dark);
            color: var(--white);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-brand {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .brand-logo {
            width: 100%;
            height: auto;
            max-width: 180px;
            margin-bottom: 12px;
        }

        .brand-logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            padding: 12px 0;
        }

        .brand-logo-text {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fbbf24;
            font-style: italic;
        }

        .sidebar-brand h1 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .sidebar-brand p {
            font-size: 10px;
            opacity: 0.6;
            letter-spacing: 0.3px;
        }

        .sidebar-menu {
            flex: 1;
            padding: 24px 0;
        }

        .menu-item {
            padding: 14px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.7);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
        }

        .menu-item.active {
            background: rgba(212, 117, 124, 0.15);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .menu-item i {
            font-size: 14px;
            width: 16px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            opacity: 0.6;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            background: var(--light);
        }

        .header {
            background: var(--white);
            border-bottom: 1px solid var(--light-gray);
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--secondary);
            letter-spacing: 0.3px;
        }

        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--secondary);
            padding: 8px;
            margin-right: 12px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
            box-shadow: var(--shadow);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--secondary);
            border: 1px solid var(--light-gray);
        }

        .btn-secondary:hover {
            background: var(--light);
            border-color: var(--secondary);
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
        }

        .btn-danger:hover {
            background: #a9433b;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }

        /* ===== DASHBOARD CARDS ===== */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(212, 117, 124, 0.05) 0%, transparent 70%);
            border-radius: 50%;
        }

        .stat-content {
            position: relative;
            z-index: 1;
        }

        .stat-label {
            font-size: 11px;
            color: var(--gray);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-detail {
            font-size: 12px;
            color: var(--gray);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        /* ===== FILTER TABS ===== */
        .filter-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--light-gray);
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--light-gray);
            background: var(--white);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            color: var(--gray);
        }

        .filter-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-tab.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        /* ===== DATA SECTION ===== */
        .data-section {
            background: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--light-gray);
            overflow: hidden;
        }

        .section-header {
            padding: 24px;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--accent);
        }

        .section-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--secondary);
            letter-spacing: 0.3px;
        }

        /* ===== TABLE ===== */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: var(--accent);
            border-bottom: 1px solid var(--light-gray);
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--light-gray);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: var(--light);
        }

        /* ===== BADGES ===== */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-confirming { background: rgba(74, 157, 111, 0.1); color: var(--success); }
        .badge-confirmed { background: rgba(74, 157, 111, 0.1); color: var(--success); }
        .badge-pending { background: rgba(236, 151, 31, 0.1); color: var(--warning); }
        .badge-notified { background: rgba(74, 157, 111, 0.1); color: var(--success); }
        .badge-rescheduling { background: rgba(236, 151, 31, 0.1); color: var(--warning); }
        .badge-cancelled { background: rgba(201, 83, 76, 0.1); color: var(--danger); }

        .badge-laser { background: rgba(212, 117, 124, 0.1); color: var(--primary); }
        .badge-picosecond { background: rgba(212, 117, 124, 0.15); color: #c9534c; }
        .badge-micro { background: rgba(74, 157, 111, 0.1); color: var(--success); }
        .badge-botox { background: rgba(59, 130, 246, 0.1); color: #2563eb; }
        .badge-hyaluronic { background: rgba(168, 85, 247, 0.1); color: #a855f7; }
        .badge-clean { background: rgba(236, 151, 31, 0.1); color: var(--warning); }
        .badge-acne { background: rgba(59, 130, 246, 0.15); color: #1d4ed8; }
        .badge-tattoo { background: rgba(100, 100, 100, 0.15); color: #374151; }
        .badge-fat-dissolve { background: rgba(236, 151, 31, 0.15); color: #d97706; }
        .badge-thread-lift { background: rgba(74, 157, 111, 0.15); color: #047857; }
        .badge-aqua-light { background: rgba(168, 85, 247, 0.15); color: #9333ea; }
        .badge-peel { background: rgba(59, 130, 246, 0.1); color: #1d4ed8; }
        .badge-photon { background: rgba(212, 117, 124, 0.15); color: #be123c; }
        .badge-other { background: rgba(100, 100, 100, 0.1); color: var(--gray); }

        /* ===== CUSTOMER CARDS ===== */
        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
            padding: 24px;
        }

        .customer-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            padding: 18px;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
        }

        .customer-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .customer-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--secondary);
        }

        .customer-info {
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .customer-history {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--light-gray);
            font-size: 11px;
        }

        .history-item {
            background: var(--light);
            padding: 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .customer-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        /* ===== STATS GRID ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-top: 24px;
            padding: 24px;
        }

        .stat-item {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-item-label {
            font-size: 11px;
            color: var(--gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .stat-item-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .modal {
            background: var(--white);
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 36px;
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--secondary);
            letter-spacing: 0.3px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 13px;
            color: var(--secondary);
            letter-spacing: 0.2px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid var(--light-gray);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(212, 117, 124, 0.02);
            box-shadow: 0 0 0 2px rgba(212, 117, 124, 0.1);
        }

        .customer-search {
            position: relative;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-top: none;
            border-radius: 0 0 6px 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
        }

        .search-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--light-gray);
            transition: background 0.2s ease;
            font-size: 13px;
        }

        .search-item:hover {
            background: var(--light);
            color: var(--primary);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .form-actions button {
            flex: 1;
            padding: 12px;
        }

        .notification-preview {
            background: var(--light);
            border: 1px solid var(--light-gray);
            border-radius: 6px;
            padding: 16px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            color: var(--secondary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
            }

            .hamburger-btn {
                display: flex;
            }

            .header {
                padding: 14px 16px;
                gap: 12px;
            }

            .header h1 {
                font-size: 16px;
            }

            .content-area {
                padding: 16px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .filter-tabs {
                flex-direction: row;
                gap: 8px;
                overflow-x: auto;
                padding-bottom: 8px;
            }

            .filter-tab {
                white-space: nowrap;
                font-size: 11px;
                padding: 7px 12px;
                flex-shrink: 0;
            }

            .dashboard {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .stat-card {
                padding: 16px;
            }

            .stat-value {
                font-size: 28px;
            }

            .customers-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 16px;
            }

            .modal {
                padding: 20px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px 8px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 220px;
            }

            .header h1 {
                font-size: 14px;
            }

            .stat-value {
                font-size: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .modal h2 {
                font-size: 18px;
            }

            .form-actions {
                flex-direction: column-reverse;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect } = React;

        const APPOINTMENTS_KEY = 'aurelie_appointments';
        const CUSTOMERS_KEY = 'aurelie_customers';

        const STATUS_OPTIONS = [
            { value: 'confirming', label: '確認中', icon: '🔵' },
            { value: 'confirmed', label: '已確認', icon: '🟢' },
            { value: 'pending', label: '待通知', icon: '⏳' },
            { value: 'notified', label: '已通知', icon: '✓' },
            { value: 'rescheduling', label: '改期中', icon: '↻' },
            { value: 'cancelled', label: '已取消', icon: '✕' }
        ];

        function App() {
            const [view, setView] = useState('dashboard');
            const [appointments, setAppointments] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [showCustomerForm, setShowCustomerForm] = useState(false);
            const [editingAppointment, setEditingAppointment] = useState(null);
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [filterStatus, setFilterStatus] = useState(null);
            const [selectedNotification, setSelectedNotification] = useState(null);
            const [dateFilter, setDateFilter] = useState(null);
            const [customerSearchQuery, setCustomerSearchQuery] = useState('');
            const [customDateRange, setCustomDateRange] = useState({ start: null, end: null });
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [statsView, setStatsView] = useState('therapy');

            useEffect(() => {
                const savedAppts = localStorage.getItem(APPOINTMENTS_KEY);
                const savedCustomers = localStorage.getItem(CUSTOMERS_KEY);
                if (savedAppts) {
                    const data = JSON.parse(savedAppts);
                    setAppointments(data.map(a => ({
                        ...a,
                        appointmentDateTime: new Date(a.appointmentDateTime),
                        price: a.price || 0,
                        isNextAppointmentDue: a.isNextAppointmentDue || false
                    })));
                }
                if (savedCustomers) {
                    const data = JSON.parse(savedCustomers);
                    setCustomers(data.map(c => ({
                        ...c,
                        isVIP: c.isVIP || false,
                        tags: c.tags || [],
                        isBlacklisted: c.isBlacklisted || false,
                        therapyHistory: c.therapyHistory || []
                    })));
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(APPOINTMENTS_KEY, JSON.stringify(appointments));
            }, [appointments]);

            useEffect(() => {
                localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(customers));
            }, [customers]);

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay());
            const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);

            const getAppointmentsForDate = (date) => {
                return appointments.filter(a => {
                    const aDate = new Date(a.appointmentDateTime);
                    aDate.setHours(0, 0, 0, 0);
                    return aDate.getTime() === date.getTime();
                });
            };

            const getAppointmentsForPeriod = (startDate, endDate) => {
                return appointments.filter(a => {
                    const aDate = new Date(a.appointmentDateTime);
                    aDate.setHours(0, 0, 0, 0);
                    return aDate >= startDate && aDate <= endDate;
                });
            };

            const todayAppts = getAppointmentsForDate(today);
            const tomorrowAppts = getAppointmentsForDate(tomorrow);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekEnd.getDate() + 6);
            const weekAppts = getAppointmentsForPeriod(weekStart, weekEnd);
            const monthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            const monthAppts = getAppointmentsForPeriod(monthStart, monthEnd);

            const getTherapyStats = () => {
                const stats = {};
                weekAppts.forEach(apt => {
                    stats[apt.therapyType] = (stats[apt.therapyType] || 0) + 1;
                });
                return stats;
            };

            const therapyStats = getTherapyStats();

            const getStaffStats = () => {
                const stats = {};
                monthAppts.forEach(apt => {
                    stats[apt.staffName] = (stats[apt.staffName] || 0) + 1;
                });
                return stats;
            };

            const getStatusStats = () => {
                const stats = {};

                                    )
                                )
                            )
                        ),
                        React.createElement('div', { className: 'form-group' },
                            React.createElement('label', null, '備註'),
                            React.createElement('textarea', { value: data.notes, onChange: (e) => setData({ ...data, notes: e.target.value }), placeholder: '輸入客人相關資訊', rows: 3 })
                        ),
                        React.createElement('div', { className: 'form-actions' },
                            React.createElement('button', { type: 'submit', className: 'btn btn-primary' }, editingCustomer ? '保存修改' : '新增客人'),
                            React.createElement('button', { type: 'button', className: 'btn btn-secondary', onClick: onCancel }, '取消')
                        )
                    )
                )
            );
        }

        function getTherapyBadgeClass(therapy) {
            switch(therapy) {
                case '雷射': return 'laser';
                case '皮秒雷射': return 'picosecond';
                case '微整': return 'micro';
                case '肉毒桿菌': return 'botox';
                case '玻尿酸': return 'hyaluronic';
                case '清粉刺': return 'clean';
                case '祛痘治療': return 'acne';
                case '除刺青': return 'tattoo';
                case '脂肪溶解針': return 'fat-dissolve';
                case '埋線提升': return 'thread-lift';
                case '水光針': return 'aqua-light';
                case '果酸煥膚': return 'peel';
                case '光子嫩膚': return 'photon';
                default: return 'other';
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
